version: "3.8"

services:
  ai-engine:
    build: ./ai_engine
    container_name: fairness-ai-engine
    ports:
      - "8000:8000"
    env_file: ./ai_engine/.env
    volumes:
      - ./ai_engine:/app
    networks:
      - fairness-network
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: fairness-backend
    ports:
      - "3001:3001"
    env_file: ./backend/.env
    depends_on:
      - ai-engine
    environment:
      - AI_ENGINE_URL=http://ai-engine:8000
    networks:
      - fairness-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: fairness-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - fairness-network
    restart: unless-stopped

networks:
  fairness-network:
    driver: bridge